name: observe
on:
  schedule:
    - cron: '13 2,8,14,20 * * *'   # offset ~3h from the engine's runs so vantage points interleave
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: observe
  cancel-in-progress: false
jobs:
  observe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
      - name: observe
        env:
          OBSERVER_KEY_PEM: ${{ secrets.OBSERVER_KEY_PEM }}
        run: |
          umask 077
          printf '%s' "$OBSERVER_KEY_PEM" > "$RUNNER_TEMP/observer_key.pem"
          SZL_OBSERVER_KEY="$RUNNER_TEMP/observer_key.pem" node observe.mjs
      - name: commit observation
        if: always()
        run: |
          git config user.name 'szl-quant-witness observer'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add observations OBSERVATIONS.md || true
          if git diff --cached --quiet; then
            echo 'nothing to commit (observation unavailable — absence is honest)'
          else
            git commit -m "obs: $(date -u +%FT%TZ) $(cat .last-verdict 2>/dev/null || echo UNAVAILABLE)"
            git push
          fi
      - name: alarm gate
        if: always()
        run: |
          V=$(cat .last-verdict 2>/dev/null || echo UNAVAILABLE)
          echo "verdict: $V"
          case "$V" in
            PREFIX_OK|ROOTS_EQUAL) exit 0 ;;
            *) echo "::error::gossip observation verdict is an alarm: $V"; exit 1 ;;
          esac
